<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="system-ui, sans-serif">
  <rect width="700" height="400" fill="#fff" rx="12"/>

  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Dutch Auction Price Discovery</text>

  <!-- Chart area -->
  <g transform="translate(80, 60)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="260" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="0" y1="260" x2="520" y2="260" stroke="#d1d5db" stroke-width="1.5"/>

    <!-- Y-axis labels -->
    <text x="-8" y="15" text-anchor="end" font-size="11" fill="#6b7280" font-weight="600">Price</text>
    <text x="-8" y="50" text-anchor="end" font-size="9" fill="#9ca3af">Starting</text>
    <text x="-8" y="260" text-anchor="end" font-size="9" fill="#9ca3af">Floor</text>
    <text x="-8" y="155" text-anchor="end" font-size="9" fill="#9ca3af">Market</text>

    <!-- X-axis labels -->
    <text x="0" y="280" text-anchor="middle" font-size="11" fill="#6b7280" font-weight="600">Time</text>
    <text x="0" y="275" text-anchor="middle" font-size="9" fill="#9ca3af">0</text>
    <text x="260" y="275" text-anchor="middle" font-size="9" fill="#9ca3af">t/2</text>
    <text x="520" y="275" text-anchor="middle" font-size="9" fill="#9ca3af">expiry</text>

    <!-- Starting price horizontal line -->
    <line x1="0" y1="50" x2="520" y2="50" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Floor price horizontal line -->
    <line x1="0" y1="260" x2="520" y2="260" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Price decay line -->
    <line x1="0" y1="50" x2="520" y2="260" stroke="#059669" stroke-width="3" stroke-linecap="round"/>

    <!-- Gradient under curve -->
    <polygon points="0,50 0,260 520,260" fill="url(#decayFade)" opacity="0.15"/>
    <defs>
      <linearGradient id="decayFade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#059669" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- Formula -->
    <text x="260" y="310" text-anchor="middle" font-size="12" fill="#374151" font-family="monospace">
      getPrice() = startingPrice − (discountRate × timeElapsed)
    </text>

    <!-- Purchase point annotation -->
    <circle cx="180" cy="140" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
    <text x="190" y="130" font-size="10" fill="#d97706" font-weight="600">Buyer purchases</text>
    <text x="190" y="143" font-size="9" fill="#6b7280">at current auction price</text>
    <line x1="180" y1="140" x2="180" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="180" y1="140" x2="0" y2="140" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- No one buys annotation -->
    <circle cx="420" cy="200" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="430" y="195" font-size="10" fill="#dc2626" font-weight="600">Expires at floor</text>
    <text x="430" y="208" font-size="9" fill="#6b7280">if no buyer engages</text>
  </g>

  <!-- Features footer -->
  <g transform="translate(80, 355)">
    <rect x="0" y="0" width="540" height="28" rx="6" fill="#f0fdf4"/>
    <text x="15" y="18" font-size="10" fill="#059669">◆ Single on-chain write at listing + purchase</text>
    <text x="250" y="18" font-size="10" fill="#059669">◆ No order books — price via time decay</text>
  </g>
</svg>
