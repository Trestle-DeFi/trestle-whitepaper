  <text x="400" y="118" text-anchor="middle" font-size="12" fill="#d1fae5">Community Growth Token</text>
  <text x="400" y="142" text-anchor="middle" font-size="11" fill="#a7f3d0">Distributed via Telegram Mini-App</text>
  <text x="400" y="158" text-anchor="middle" font-size="11" fill="#a7f3d0">Tasks · Referrals · Airdrops</text>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#a7f3d0">Spent on digital goods &amp; profile boosts</text>

  <!-- Arrow Stake→Mine -->
