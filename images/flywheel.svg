  <text x="400" y="425" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Vault: Governance Token</text>
  <text x="400" y="448" text-anchor="middle" font-size="12" fill="#d1fae5">Value Capture Token</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#a7f3d0">Earned through Vault staking</text>
  <text x="400" y="488" text-anchor="middle" font-size="11" fill="#a7f3d0">Earns % of marketplace transaction fees</text>
  <text x="400" y="508" text-anchor="middle" font-size="11" fill="#a7f3d0">Voting rights · Protocol governance</text>

  <!-- Bottom note -->
  <rect x="250" y="545" width="300" height="35" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="567" text-anchor="middle" font-size="11" fill="#475569">Self-sustaining economic engine</text>
