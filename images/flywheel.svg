  <text x="400" y="283" text-anchor="middle" font-size="12" fill="#d1fae5">Liquidity Anchor Token</text>
  <text x="400" y="307" text-anchor="middle" font-size="11" fill="#a7f3d0">Stake BRT/WPOL LP to earn BRT rewards</text>
  <text x="400" y="323" text-anchor="middle" font-size="11" fill="#a7f3d0">Deep liquidity on Polygon since 2021</text>
  <text x="400" y="343" text-anchor="middle" font-size="11" fill="#a7f3d0">LP Mining · Staking Rewards</text>

  <!-- Arrow Mine→Vault -->
