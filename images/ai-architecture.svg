  <text x="400" y="400" text-anchor="middle" font-size="9" fill="#475569">Protocol upgrades</text>
  <text x="400" y="416" text-anchor="middle" font-size="9" fill="#475569">Fee structures</text>
  <text x="400" y="432" text-anchor="middle" font-size="9" fill="#475569">Treasury allocations</text>

  <rect x="505" y="360" width="180" height="85" rx="8" fill="#fff" stroke="#10b981" stroke-width="1"/>
  <text x="595" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">Dispute Resolution</text>
  <text x="595" y="400" text-anchor="middle" font-size="9" fill="#475569">Kleros integration</text>
  <text x="595" y="416" text-anchor="middle" font-size="9" fill="#475569">Community jurors</text>
  <text x="595" y="432" text-anchor="middle" font-size="9" fill="#475569">AI-assisted rulings</text>

  <!-- Bottom: AI Governance -->
  <rect x="150" y="485" width="500" height="45" rx="10" fill="url(#g1)" opacity="0.9"/>
  <text x="400" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">AI Governance: Node operators participate in AI model governance</text>

  <rect x="150" y="540" width="500" height="40" rx="10" fill="#1e293b"/>
  <text x="400" y="565" text-anchor="middle" font-size="11" fill="#94a3b8">Open-source models: Llama 3 · Mixtral · StableLM · LLaVA</text>
