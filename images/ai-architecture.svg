  <text x="205" y="400" text-anchor="middle" font-size="9" fill="#475569">Provide BroilerPlus LP</text>
  <text x="205" y="416" text-anchor="middle" font-size="9" fill="#475569">Earn BRT Rewards</text>
  <text x="205" y="432" text-anchor="middle" font-size="9" fill="#475569">Voting rights granted</text>

  <rect x="310" y="360" width="180" height="85" rx="8" fill="#fff" stroke="#10b981" stroke-width="1"/>
