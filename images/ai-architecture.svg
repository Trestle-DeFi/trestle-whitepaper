  <text x="130" y="240" text-anchor="middle" font-size="9" fill="#d1fae5">Analyzes evidence</text>
  <text x="130" y="256" text-anchor="middle" font-size="9" fill="#d1fae5">Recommends fair rulings</text>

  <rect x="225" y="198" width="170" height="78" rx="8" fill="url(#g2)" opacity="0.85"/>
  <text x="310" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Freelancer Matching</text>
  <text x="310" y="240" text-anchor="middle" font-size="9" fill="#d1fae5">Skill-based job pairing</text>
  <text x="310" y="256" text-anchor="middle" font-size="9" fill="#d1fae5">Reputation scoring</text>

  <rect x="405" y="198" width="170" height="78" rx="8" fill="url(#g3)" opacity="0.85"/>
