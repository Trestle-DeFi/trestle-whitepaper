  <text x="400" y="118" text-anchor="middle" font-size="10" fill="#a7f3d0">Earn hNOBT for AI compute and inference</text>

  <!-- Down arrow -->
  <line x1="400" y1="130" x2="400" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

