<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="system-ui, sans-serif">
  <rect width="750" height="500" fill="#fff" rx="12"/>

  <text x="375" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Governance &amp; Vault Flow</text>

  <!-- Row 1: Stake -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#059669"/>
    <text x="100" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Stake</text>
    <text x="100" y="45" text-anchor="middle" font-size="10" fill="#d1fae5">Stake BRT/WPOL LP</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#d1fae5">in the Vault contract</text>

    <rect x="280" y="0" width="200" height="70" rx="10" fill="#10b981"/>
    <text x="380" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Earn Points</text>
    <text x="380" y="45" text-anchor="middle" font-size="10" fill="#d1fae5">Governance Points</text>
    <text x="380" y="58" text-anchor="middle" font-size="10" fill="#d1fae5">accrue over time</text>

    <!-- Arrow 1 → 2 -->
    <path d="M200,35 L280,35" stroke="#a7f3d0" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>
  </g>

  <!-- Row 2: Governance Token -->
  <g transform="translate(50, 170)">
    <rect x="130" y="0" width="200" height="70" rx="10" fill="#34d399"/>
    <text x="230" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Convert</text>
    <text x="230" y="45" text-anchor="middle" font-size="10" fill="#ecfdf5">Points → Governance Tokens</text>
    <text x="230" y="58" text-anchor="middle" font-size="10" fill="#ecfdf5">(1M fixed supply)</text>

    <rect x="410" y="0" width="200" height="70" rx="10" fill="#6ee7b7"/>
    <text x="510" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Vote</text>
    <text x="510" y="45" text-anchor="middle" font-size="10" fill="#065f46">Platform fees, upgrades,</text>
    <text x="510" y="58" text-anchor="middle" font-size="10" fill="#065f46">RWA proposals, treasury</text>
  </g>

  <!-- Arrow 2 → 3 (Row 1 → Row 2) -->
  <path d="M380,130 L380,160 L330,160 L330,170" stroke="#a7f3d0" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>

  <!-- Trigger condition -->
  <g transform="translate(50, 280)">
    <rect x="200" y="0" width="280" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="340" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Trigger: Marketplace Mainnet Launch</text>
    <text x="340" y="32" text-anchor="middle" font-size="10" fill="#92400e">+ fee generation activates token conversion</text>
  </g>

  <!-- Arrow down to trigger -->
  <path d="M230,170 L230,280" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)" fill="none"/>

  <!-- Earn fees flow -->
  <g transform="translate(50, 360)">
    <rect x="80" y="0" width="200" height="60" rx="10" fill="#f59e0b"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Marketplace Fees</text>
    <text x="180" y="40" text-anchor="middle" font-size="10" fill="#fef3c7">% of every transaction</text>
    <text x="180" y="53" text-anchor="middle" font-size="10" fill="#fef3c7">distributed to holders</text>

    <rect x="360" y="0" width="200" height="60" rx="10" fill="#f97316"/>
    <text x="460" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Governance Rights</text>
    <text x="460" y="40" text-anchor="middle" font-size="10" fill="#ffedd5">Vote on platform direction</text>
    <text x="460" y="53" text-anchor="middle" font-size="10" fill="#ffedd5">Treasury allocations</text>
  </g>

  <!-- Arrow Row 2 Vote → Row 3 -->
  <path d="M610,205 L650,205 L650,390 L560,390" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)" fill="none"/>

  <!-- Arrow Row 2 Convert → Row 3 -->
  <path d="M230,240 L230,360" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)" fill="none"/>

  <!-- Key info box -->
  <g transform="translate(50, 445)">
    <rect x="0" y="0" width="620" height="40" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
    <text x="15" y="16" font-size="10" fill="#059669">● Governance Token not sold/ICOd — earned only through Vault staking</text>
    <text x="15" y="32" font-size="10" fill="#059669">● Protects against short-term speculators — aligns governors with long-term health</text>
  </g>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
