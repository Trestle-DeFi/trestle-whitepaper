<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#0284c7"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/></marker>
  </defs>

  <rect width="800" height="600" fill="#f8fafc" rx="12"/>

  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Marketplace Ecosystem Flow</text>

  <!-- Top row: Participants -->
  <rect x="40" y="55" width="220" height="90" rx="10" fill="url(#g1)" opacity="0.9"/>
  <text x="150" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Freelancers</text>
  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#d1fae5">Provide services &amp; digital goods</text>
  <text x="150" y="125" text-anchor="middle" font-size="10" fill="#a7f3d0">Earn hNOBT · Boost profiles</text>

  <rect x="290" y="55" width="220" height="90" rx="10" fill="url(#g2)" opacity="0.9"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Buyers</text>
  <text x="400" y="105" text-anchor="middle" font-size="11" fill="#d1fae5">Purchase services &amp; digital goods</text>
  <text x="400" y="125" text-anchor="middle" font-size="10" fill="#a7f3d0">Milestone escrow · Dispute protection</text>

  <rect x="540" y="55" width="220" height="90" rx="10" fill="url(#g3)" opacity="0.9"/>
  <text x="650" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Liquidity Providers</text>
  <text x="650" y="105" text-anchor="middle" font-size="11" fill="#e0f2fe">Provide BroilerPlus LP</text>
  <text x="650" y="125" text-anchor="middle" font-size="10" fill="#bae6fd">Earn BroilerPlus + Gov Points</text>

  <!-- Arrows from participants to marketplace -->
  <line x1="150" y1="145" x2="150" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="145" x2="400" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="145" x2="650" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Marketplace Hub -->
  <rect x="100" y="180" width="600" height="150" rx="14" fill="#f1f5f9" stroke="#10b981" stroke-width="2"/>
  <rect x="100" y="180" width="600" height="35" rx="14" fill="#10b981"/>
  <rect x="100" y="200" width="600" height="15" fill="#10b981"/>
  <text x="400" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Trestle Marketplace</text>

  <text x="400" y="240" text-anchor="middle" font-size="11" fill="#475569">Smart Contract Escrow · Milestone Payments · Dispute Resolution</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#475569">AI-Powered Freelancer Matching · Fraud Detection</text>
  <text x="400" y="280" text-anchor="middle" font-size="11" fill="#475569">Digital Goods · Dutch Auction · Fixed Price Listings</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#475569">Multi-Currency: hNOBT / BroilerPlus / USDC / MATIC</text>

  <!-- Output arrows -->
  <line x1="150" y1="330" x2="150" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="330" x2="400" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="330" x2="650" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output row -->
  <rect x="40" y="365" width="220" height="85" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Earnings &amp; Rewards</text>
  <text x="150" y="412" text-anchor="middle" font-size="10" fill="#b45309">hNOBT · USDC · MATIC</text>
  <text x="150" y="432" text-anchor="middle" font-size="10" fill="#b45309">Profile boosts · Staking yields</text>

  <rect x="290" y="365" width="220" height="85" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Governance</text>
  <text x="400" y="412" text-anchor="middle" font-size="10" fill="#6d28d9">Voting on fees &amp; upgrades</text>
  <text x="400" y="432" text-anchor="middle" font-size="10" fill="#6d28d9">Treasury allocations</text>

  <rect x="540" y="365" width="220" height="85" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="650" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#064e3b">RWA Tokenization</text>
  <text x="650" y="412" text-anchor="middle" font-size="10" fill="#065f46">Fractional real estate &amp; bonds</text>
  <text x="650" y="432" text-anchor="middle" font-size="10" fill="#065f46">Institutional-grade opportunities</text>

  <!-- Bottom -->
  <rect x="150" y="475" width="500" height="45" rx="10" fill="#1e293b"/>
  <text x="400" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Flywheel: Stake hNOBT · Mine BroilerPlus LP · Vault GOV Tokens</text>

  <text x="400" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">All participants interact through the marketplace using zero-friction onboarding</text>
</svg>
