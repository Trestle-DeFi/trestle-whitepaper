<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, sans-serif">
  <rect width="800" height="500" fill="#fff" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Token Distribution &amp; Emission Model</text>

  <!-- Legend -->
  <g transform="translate(20, 55)" font-size="11">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#059669"/>
    <text x="18" y="10" fill="#4b5563">Staking Rewards (50%)</text>
    <rect x="0" y="20" width="12" height="12" rx="2" fill="#10b981"/>
    <text x="18" y="30" fill="#4b5563">Liquidity Providers (25%)</text>
    <rect x="0" y="40" width="12" height="12" rx="2" fill="#34d399"/>
    <text x="18" y="50" fill="#4b5563">Treasury &amp; Ecosystem (15%)</text>
    <rect x="0" y="60" width="12" height="12" rx="2" fill="#a7f3d0"/>
    <text x="18" y="70" fill="#4b5563">Team &amp; Advisors (10%)</text>
  </g>

  <!-- Pie chart -->
  <g transform="translate(240, 270)">
    <!-- Staking Rewards 50% (180 deg) -->
    <path d="M0,0 L0,-160 A160,160 0 1,1 -0.01,-160 Z" fill="#059669"/>
    <!-- Liquidity 25% (90 deg) -->
    <path d="M0,0 L-0.01,-160 A160,160 0 0,0 160,0 Z" fill="#10b981"/>
    <!-- Treasury 15% (54 deg) -->
    <path d="M0,0 L160,0 A160,160 0 0,0 107.8,-118.2 Z" fill="#34d399"/>
    <!-- Team 10% (36 deg) -->
    <path d="M0,0 L107.8,-118.2 A160,160 0 0,0 50.2,-151.9 Z" fill="#a7f3d0"/>
    <circle cx="0" cy="0" r="60" fill="#fff"/>
    <text x="0" y="-5" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">BRT</text>
    <text x="0" y="12" text-anchor="middle" font-size="10" fill="#6b7280">Supply</text>
  </g>

  <!-- Bar chart - Emission over time -->
  <g transform="translate(460, 60)">
    <text x="150" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Dynamic Emission Over Time</text>
    <!-- Y axis -->
    <line x1="40" y1="20" x2="40" y2="230" stroke="#d1d5db" stroke-width="1"/>
    <!-- X axis -->
    <line x1="40" y1="230" x2="300" y2="230" stroke="#d1d5db" stroke-width="1"/>
    <!-- Y labels -->
    <text x="35" y="30" text-anchor="end" font-size="9" fill="#9ca3af">High</text>
    <text x="35" y="130" text-anchor="end" font-size="9" fill="#9ca3af">Med</text>
    <text x="35" y="225" text-anchor="end" font-size="9" fill="#9ca3af">Low</text>
    <!-- X labels -->
    <text x="60" y="245" text-anchor="middle" font-size="9" fill="#9ca3af">2026</text>
    <text x="130" y="245" text-anchor="middle" font-size="9" fill="#9ca3af">2027</text>
    <text x="200" y="245" text-anchor="middle" font-size="9" fill="#9ca3af">2028</text>
    <text x="270" y="245" text-anchor="middle" font-size="9" fill="#9ca3af">2029+</text>
    <!-- Emission curve -->
    <path d="M50,80 Q100,60 140,100 Q180,140 220,180 Q260,210 290,220" stroke="#059669" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Area under curve -->
    <path d="M50,230 L50,80 Q100,60 140,100 Q180,140 220,180 Q260,210 290,220 L290,230 Z" fill="url(#fade)" opacity="0.3"/>
    <defs>
      <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#059669" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#059669" stop-opacity="0.05"/>
      </linearGradient>
    </defs>
    <!-- Annotation arrows -->
    <text x="95" y="52" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">Boost Mode</text>
    <text x="95" y="63" text-anchor="middle" font-size="8" fill="#6b7280">(bull market)</text>
    <text x="240" y="200" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">Taper Mode</text>
    <text x="240" y="211" text-anchor="middle" font-size="8" fill="#6b7280">(bear market)</text>

    <!-- Mining pool remaining -->
    <rect x="50" y="270" width="240" height="20" rx="4" fill="#e5e7eb"/>
    <rect x="50" y="270" width="192" height="20" rx="4" fill="#059669"/>
    <text x="170" y="284" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Mining Pool: 60%+ of Supply</text>
    <text x="50" y="305" font-size="8" fill="#6b7280">▸ Governance adjusts emission rate via on-chain voting</text>
    <text x="50" y="318" font-size="8" fill="#6b7280">▸ Pool locked in Mine contract — cannot be drained</text>
  </g>
</svg>
