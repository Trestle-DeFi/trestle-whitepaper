name: Build Whitepaper PDF and Deploy to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools and SVG Support
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin weasyprint pandoc

      - name: Create Build Directory
        run: mkdir -p _site

      - name: Compile README to PDF
        run: |
          pandoc README.md \
            -o _site/whitepaper.pdf \
            -f gfm \
            --pdf-engine=weasyprint \
            --metadata title="Trestle DeFi Whitepaper"

      - name: Generate Git Pages Index Page
        run: |
          cat << 'EOF' > _site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Trestle DeFi Whitepaper</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #d1fae5 100%); color: #1f2937; }
                  .card { max-width: 520px; width: 90%; background: white; border-radius: 20px; padding: 48px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04); border: 1px solid rgba(16,185,129,0.15); }
                  .logo { font-size: 28px; margin-bottom: 8px; }
                  h1 { font-size: 28px; font-weight: 700; color: #111827; margin-bottom: 12px; }
                  p { font-size: 15px; color: #6b7280; line-height: 1.7; margin-bottom: 32px; }
                  .btn-row { display: flex; flex-direction: column; gap: 12px; }
                  .btn-primary { display: block; background: #059669; color: white; padding: 14px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 15px; transition: background 0.2s, transform 0.15s; }
                  .btn-primary:hover { background: #047857; transform: translateY(-1px); }
                  .btn-secondary { display: block; background: transparent; color: #059669; padding: 14px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 15px; border: 2px solid #059669; transition: background 0.2s; }
                  .btn-secondary:hover { background: #f0fdf4; }
                  .footer { margin-top: 32px; font-size: 13px; color: #9ca3af; }
              </style>
          </head>
          <body>
              <div class="card">
                  <div class="logo">📄</div>
                  <h1>Trestle DeFi Whitepaper</h1>
                  <p>The complete Trestle DeFi whitepaper — covering the Stake-Mine-Vault flywheel, Dutch auction marketplace, milestone escrow, governance model, and tokenomics — compiled with full SVG graphics.</p>
                  <div class="btn-row">
                      <a href="https://github.com/Trestle-DeFi/trestle-whitepaper" class="btn-primary" target="_blank">Read Online</a>
                      <a href="whitepaper.pdf" class="btn-secondary" download>Download PDF</a>
                  </div>
                  <div class="footer">Version 1.0 &middot; Trestle DeFi</div>
              </div>
          </body>
          </html>
          EOF

      - name: Copy Assets (Images/SVGs) to Public Folder
        run: |
          # Copies any asset images over so the web view can find them if needed
          cp -r *.svg _site/ 2>/dev/null || true
          cp -r images/ _site/ 2>/dev/null || true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

