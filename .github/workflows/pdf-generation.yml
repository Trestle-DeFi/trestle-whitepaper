name: Build Whitepaper PDF and Deploy to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Tools and SVG Support
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin weasyprint pandoc

      - name: Create Build Directory
        run: mkdir -p _site

      - name: Compile README to PDF
        run: |
          pandoc README.md \
            -o _site/whitepaper.pdf \
            -f gfm \
            --pdf-engine=weasyprint \
            --metadata title="Trestle DeFi Whitepaper"

      - name: Generate Git Pages Index Page
        run: |
          cat << 'EOF' > _site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Whitepaper Project</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #333; }
                  h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
                  .btn { display: inline-block; background: #0066cc; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
                  .btn:hover { background: #0052a3; }
              </style>
          </head>
          <body>
              <h1>Whitepaper Project</h1>
              <p>The latest version of the whitepaper has been successfully compiled from the repository README with full SVG graphic support.</p>
              <a href="whitepaper.pdf" class="btn" download>Download PDF Whitepaper</a>
          </body>
          </html>
          EOF

      - name: Copy Assets (Images/SVGs) to Public Folder
        run: |
          # Copies any asset images over so the web view can find them if needed
          cp -r *.svg _site/ 2>/dev/null || true
          cp -r images/ _site/ 2>/dev/null || true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

